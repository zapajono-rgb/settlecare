# Render Blueprint for SettleCare
# Deploys the Flask backend + a free Postgres DB.
# Frontend stays on Vercel (https://settlecare.vercel.app).

services:
  # Backend API (Flask + gunicorn)
  - type: web
    name: settlecare-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2
    healthCheckPath: /api/health
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: settlecare-db
          property: connectionString
      - key: CORS_ORIGINS
        value: https://settlecare.vercel.app
      - key: FRONTEND_URL
        value: https://settlecare.vercel.app
      - key: FLASK_ENV
        value: production

databases:
  - name: settlecare-db
    plan: free
    databaseName: settlecare
