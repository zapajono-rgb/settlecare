services:
  # Backend API
  - type: web
    name: settlecare-api
    runtime: python
    repo: https://github.com/YOUR_USERNAME/settlecare
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: settlecare-db
          property: connectionURI
      - key: CORS_ORIGINS
        value: https://settlecare.onrender.com
      - key: FRONTEND_URL
        value: https://settlecare.onrender.com
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PRICE_MONTHLY
        sync: false
      - key: STRIPE_PRICE_YEARLY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: FLASK_ENV
        value: production
    healthCheckPath: /api/health

  # Frontend (static site)
  - type: web
    name: settlecare
    runtime: static
    repo: https://github.com/YOUR_USERNAME/settlecare
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: build
    envVars:
      - key: REACT_APP_API_URL
        value: https://settlecare-api.onrender.com
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=86400
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: settlecare-db
    plan: free
    databaseName: settlecare
